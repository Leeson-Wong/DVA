<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="320" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="300" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">两个基元</text>

  <!-- Entity Node -->
  <circle cx="180" cy="140" r="50" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="180" y="136" text-anchor="middle" font-size="15" font-weight="600" fill="#1e40af">实体</text>
  <text x="180" y="154" text-anchor="middle" font-size="11" fill="#3b82f6">Entity</text>
  <text x="180" y="220" text-anchor="middle" font-size="12" fill="#64748b">持有状态</text>
  <text x="180" y="238" text-anchor="middle" font-size="11" fill="#94a3b8">节点</text>

  <!-- Relation Edge -->
  <ellipse cx="420" cy="140" rx="60" ry="40" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="420" y="136" text-anchor="middle" font-size="15" font-weight="600" fill="#92400e">关系</text>
  <text x="420" y="154" text-anchor="middle" font-size="11" fill="#d97706">Relation</text>
  <text x="420" y="210" text-anchor="middle" font-size="12" fill="#64748b">连接实体</text>
  <text x="420" y="228" text-anchor="middle" font-size="11" fill="#94a3b8">边</text>

  <!-- Connection line -->
  <line x1="230" y1="140" x2="358" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6 3"/>

  <!-- Core Criterion Box -->
  <rect x="120" y="268" width="360" height="40" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="300" y="293" text-anchor="middle" font-size="14" font-weight="600" fill="#15803d">核心判据：变化速率是否对齐？</text>

  <!-- Arrows from entities to criterion -->
  <path d="M 180 190 L 180 260 L 200 268" stroke="#3b82f6" stroke-width="1.5" fill="none"/>
  <path d="M 420 180 L 420 260 L 400 268" stroke="#f59e0b" stroke-width="1.5" fill="none"/>
</svg>
