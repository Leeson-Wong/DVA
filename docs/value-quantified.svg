<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="720" height="360">
  <style>
    text { font-family: -apple-system, "Segoe UI", sans-serif; }
  </style>

  <!-- 4 top metrics -->
  <g transform="translate(20, 30)">
    <text font-size="28" font-weight="800" fill="#7c3aed">-39%</text>
    <text font-size="11" fill="#64748b" y="16">代码净增 vs superpowers</text>
    <text font-size="9" fill="#94a3b8" y="29">654 行 vs 1071 行</text>
  </g>
  <g transform="translate(195, 30)">
    <text font-size="28" font-weight="800" fill="#2563eb">+22</text>
    <text font-size="11" fill="#64748b" y="16">base 遗漏的必要文件</text>
    <text font-size="9" fill="#94a3b8" y="29">dims 全部找到</text>
  </g>
  <g transform="translate(370, 30)">
    <text font-size="28" font-weight="800" fill="#059669">83.6%</text>
    <text font-size="11" fill="#64748b" y="16">God Class 缩减</text>
    <text font-size="9" fill="#94a3b8" y="29">721 → 118 行</text>
  </g>
  <g transform="translate(555, 30)">
    <text font-size="28" font-weight="800" fill="#7c3aed">6.5x</text>
    <text font-size="11" fill="#64748b" y="16">测试用例 vs base</text>
    <text font-size="9" fill="#94a3b8" y="29">98 vs ~15</text>
  </g>

  <line x1="20" y1="68" x2="700" y2="68" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Legend -->
  <g transform="translate(190, 82)">
    <rect width="10" height="10" rx="2" fill="#94a3b8"/>
    <text font-size="10" fill="#64748b" x="14" y="9">base</text>
    <rect x="60" width="10" height="10" rx="2" fill="#2563eb"/>
    <text font-size="10" fill="#64748b" x="74" y="9">dims</text>
    <rect x="130" width="10" height="10" rx="2" fill="#059669"/>
    <text font-size="10" fill="#64748b" x="144" y="9">superpowers</text>
    <rect x="240" width="10" height="10" rx="2" fill="#7c3aed"/>
    <text font-size="10" fill="#0f172a" font-weight="600" x="254" y="9">dims+super</text>
  </g>

  <!-- 5 dimensions as grouped bars -->
  <!-- max bar width = 400, each env gets 80px slot, 4 slots = 320px, centered in 400 -->
  <!-- bar heights: scale 0-100 → 0-50px -->

  <!-- Row 1: 改动完整性 base:30 dims:95 super:55 combo:85 -->
  <g transform="translate(20, 106)">
    <text font-size="11" fill="#334155" font-weight="600" y="40">改动完整性</text>
    <text font-size="9" fill="#94a3b8" y="52">找到所有受影响的代码</text>
    <g transform="translate(140, 0)">
      <rect x="0"  y="20" width="80" height="30" rx="3" fill="#94a3b8" opacity="0.25"/>
      <rect x="0"  y="20" width="24" height="30" rx="3" fill="#94a3b8"/>
      <text font-size="9" fill="#64748b" x="4" y="16">30</text>

      <rect x="85" y="20" width="80" height="30" rx="3" fill="#2563eb" opacity="0.25"/>
      <rect x="85" y="20" width="76" height="30" rx="3" fill="#2563eb"/>
      <text font-size="9" fill="#64748b" x="110" y="16">95</text>

      <rect x="170" y="20" width="80" height="30" rx="3" fill="#059669" opacity="0.25"/>
      <rect x="170" y="20" width="44" height="30" rx="3" fill="#059669"/>
      <text font-size="9" fill="#64748b" x="190" y="16">55</text>

      <rect x="255" y="20" width="80" height="30" rx="3" fill="#7c3aed" opacity="0.25"/>
      <rect x="255" y="20" width="68" height="30" rx="3" fill="#7c3aed"/>
      <text font-size="9" fill="#64748b" x="275" y="16">85</text>
    </g>
  </g>

  <!-- Row 2: 代码精简度 base:90 dims:40 super:30 combo:75 -->
  <g transform="translate(20, 160)">
    <text font-size="11" fill="#334155" font-weight="600" y="40">代码精简度</text>
    <text font-size="9" fill="#94a3b8" y="52">用更少的代码完成功能</text>
    <g transform="translate(140, 0)">
      <rect x="0"  y="20" width="80" height="30" rx="3" fill="#94a3b8" opacity="0.25"/>
      <rect x="0"  y="20" width="72" height="30" rx="3" fill="#94a3b8"/>
      <text font-size="9" fill="#64748b" x="30" y="16">90</text>

      <rect x="85" y="20" width="80" height="30" rx="3" fill="#2563eb" opacity="0.25"/>
      <rect x="85" y="20" width="32" height="30" rx="3" fill="#2563eb"/>
      <text font-size="9" fill="#64748b" x="95" y="16">40</text>

      <rect x="170" y="20" width="80" height="30" rx="3" fill="#059669" opacity="0.25"/>
      <rect x="170" y="20" width="24" height="30" rx="3" fill="#059669"/>
      <text font-size="9" fill="#64748b" x="178" y="16">30</text>

      <rect x="255" y="20" width="80" height="30" rx="3" fill="#7c3aed" opacity="0.25"/>
      <rect x="255" y="20" width="60" height="30" rx="3" fill="#7c3aed"/>
      <text font-size="9" fill="#64748b" x="275" y="16">75</text>
    </g>
  </g>

  <!-- Row 3: 测试覆盖 base:10 dims:15 super:95 combo:70 -->
  <g transform="translate(20, 214)">
    <text font-size="11" fill="#334155" font-weight="600" y="40">测试覆盖</text>
    <text font-size="9" fill="#94a3b8" y="52">自动化测试保障功能正确</text>
    <g transform="translate(140, 0)">
      <rect x="0"  y="20" width="80" height="30" rx="3" fill="#94a3b8" opacity="0.25"/>
      <rect x="0"  y="20" width="8" height="30" rx="3" fill="#94a3b8"/>
      <text font-size="9" fill="#64748b" x="2" y="16">10</text>

      <rect x="85" y="20" width="80" height="30" rx="3" fill="#2563eb" opacity="0.25"/>
      <rect x="85" y="20" width="12" height="30" rx="3" fill="#2563eb"/>
      <text font-size="9" fill="#64748b" x="88" y="16">15</text>

      <rect x="170" y="20" width="80" height="30" rx="3" fill="#059669" opacity="0.25"/>
      <rect x="170" y="20" width="76" height="30" rx="3" fill="#059669"/>
      <text font-size="9" fill="#64748b" x="195" y="16">95</text>

      <rect x="255" y="20" width="80" height="30" rx="3" fill="#7c3aed" opacity="0.25"/>
      <rect x="255" y="20" width="56" height="30" rx="3" fill="#7c3aed"/>
