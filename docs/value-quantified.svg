  <!-- Axes at (cos(θ-90°)*r, sin(θ-90°)*r): -->
  <!-- 0: (0, -50), 72: (47.55, -15.45), 144: (29.39, 40.45), 216: (-29.39, 40.45), 288: (-47.55, -15.45) -->

  <!-- base -->
  <g transform="translate(90, 160)">
    <text font-size="11" font-weight="700" fill="#94a3b8" text-anchor="middle" y="-62">base</text>
    <!-- grid -->
    <polygon points="0,-25 23.8,-7.7 14.7,20.2 -14.7,20.2 -23.8,-7.7" fill="none" stroke="#e2e8f0" stroke-width="0.6"/>
    <polygon points="0,-50 47.55,-15.45 29.39,40.45 -29.39,40.45 -47.55,-15.45" fill="none" stroke="#e2e8f0" stroke-width="0.6"/>
    <!-- axes -->
    <line x1="0" y1="0" x2="0" y2="-50" stroke="#e2e8f0" stroke-width="0.4"/>
    <line x1="0" y1="0" x2="47.55" y2="-15.45" stroke="#e2e8f0" stroke-width="0.4"/>
    <line x1="0" y1="0" x2="29.39" y2="40.45" stroke="#e2e8f0" stroke-width="0.4"/>
    <line x1="0" y1="0" x2="-29.39" y2="40.45" stroke="#e2e8f0" stroke-width="0.4"/>
    <line x1="0" y1="0" x2="-47.55" y2="-15.45" stroke="#e2e8f0" stroke-width="0.4"/>
    <!-- data: 30, 90, 10, 40, 90 -->
    <polygon points="0,-15 42.8,-13.9 2.94,4.05 -11.76,16.18 -42.8,-13.9" fill="#94a3b833" stroke="#94a3b8" stroke-width="1.5"/>
    <!-- labels -->
    <text font-size="7.5" fill="#64748b" text-anchor="middle" x="0" y="-53">完整性</text>
    <text font-size="7.5" fill="#64748b" text-anchor="start" x="50" y="-14">精简</text>
    <text font-size="7.5" fill="#64748b" text-anchor="start" x="32" y="49">测试</text>
    <text font-size="7.5" fill="#64748b" text-anchor="end" x="-32" y="49">隔离</text>
    <text font-size="7.5" fill="#64748b" text-anchor="end" x="-50" y="-14">克制</text>
