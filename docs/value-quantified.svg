  <g transform="translate(20, 268)">
    <text font-size="11" fill="#334155" font-weight="600" y="40">主流程隔离</text>
    <text font-size="9" fill="#94a3b8" y="52">新需求不触碰核心流程</text>
    <g transform="translate(140, 0)">
      <rect x="0"  y="20" width="80" height="30" rx="3" fill="#94a3b8" opacity="0.25"/>
      <rect x="0"  y="20" width="32" height="30" rx="3" fill="#94a3b8"/>
      <text font-size="9" fill="#64748b" x="10" y="16">40</text>

      <rect x="85" y="20" width="80" height="30" rx="3" fill="#2563eb" opacity="0.25"/>
      <rect x="85" y="20" width="76" height="30" rx="3" fill="#2563eb"/>
      <text font-size="9" fill="#64748b" x="110" y="16">95</text>

      <rect x="170" y="20" width="80" height="30" rx="3" fill="#059669" opacity="0.25"/>
      <rect x="170" y="20" width="56" height="30" rx="3" fill="#059669"/>
      <text font-size="9" fill="#64748b" x="190" y="16">70</text>

      <rect x="255" y="20" width="80" height="30" rx="3" fill="#7c3aed" opacity="0.25"/>
      <rect x="255" y="20" width="72" height="30" rx="3" fill="#7c3aed"/>
      <text font-size="9" fill="#64748b" x="280" y="16">90</text>
    </g>
