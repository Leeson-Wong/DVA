    <line x1="0" y1="0" x2="47.55" y2="-15.45" stroke="#e2e8f0" stroke-width="0.4"/>
    <line x1="0" y1="0" x2="29.39" y2="40.45" stroke="#e2e8f0" stroke-width="0.4"/>
    <line x1="0" y1="0" x2="-29.39" y2="40.45" stroke="#e2e8f0" stroke-width="0.4"/>
    <line x1="0" y1="0" x2="-47.55" y2="-15.45" stroke="#e2e8f0" stroke-width="0.4"/>
