<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" width="720" height="260">
  <style>
    text { font-family: -apple-system, "Segoe UI", sans-serif; }
  </style>

  <!-- 4 top metrics -->
  <g transform="translate(20, 28)">
    <text font-size="26" font-weight="800" fill="#7c3aed">-39%</text>
    <text font-size="10" fill="#64748b" y="14">代码净增 vs superpowers</text>
    <text font-size="9" fill="#94a3b8" y="26">654 行 vs 1071 行</text>
  </g>
  <g transform="translate(195, 28)">
    <text font-size="26" font-weight="800" fill="#2563eb">+22</text>
    <text font-size="10" fill="#64748b" y="14">base 遗漏的必要文件</text>
    <text font-size="9" fill="#94a3b8" y="26">dims 全部找到</text>
  </g>
  <g transform="translate(370, 28)">
