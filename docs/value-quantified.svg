  <!-- Key findings at bottom -->
  <line x1="20" y1="336" x2="700" y2="336" stroke="#e2e8f0" stroke-width="1"/>
  <text font-size="9" fill="#94a3b8" x="20" y="352">GLM-5.1 · Shopizer + TEAMMATES · 两轮对照 · dims+super 在 4/5 维度得分最高或次高</text>
